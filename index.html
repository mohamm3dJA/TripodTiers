<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tripod Tiers | GitHub Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@500;800&display=swap');

        html { scroll-behavior: smooth; }

        body {
            background: linear-gradient(-45deg, #0b0b0e, #1a1a24, #0b0b0e, #12121a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 150vh; /* Extra height for scrolling */
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { width: 100%; max-width: 800px; }

        h1 {
            text-align: center;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: #efefff;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #777;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            padding: 10px 20px;
        }

        .tab-btn.active { color: #fff; position: relative; }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 0; width: 100%; height: 3px;
            background: #ff7fff;
            box-shadow: 0 0 10px rgba(255, 127, 255, 0.5);
        }

        .tier-list { display: none; flex-direction: column; gap: 12px; animation: fadeIn 0.5s ease; }
        .tier-list.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Row Styling (SMP & PvP) */
        .row {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
        }
        .row:hover { transform: translateX(10px); background: rgba(255, 255, 255, 0.07); }

        .pfp { width: 40px; height: 40px; border-radius: 50%; margin-right: 15px; }

        /* Grid for the new Tiers Section */
        .tiers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding-bottom: 50px;
        }

        .tier-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
        }

        .tier-card:hover {
            border-color: #ff7fff;
            background: rgba(255, 127, 255, 0.05);
            transform: translateY(-5px);
        }

        .icon-box {
            width: 60px;
            height: 60px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-box img { width: 35px; height: 35px; object-fit: contain; }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: block;
        }

        .player-entry {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        .t-s { color: #ff7fff; font-weight: 900; }
        .t-a { color: #ff4d4d; font-weight: 900; }

    </style>
</head>
<body>

<div class="container">
    <h1>Tripod Tiers</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('smp')">SMP</button>
        <button class="tab-btn" onclick="openTab('pvp')">PvP</button>
        <button class="tab-btn" onclick="openTab('tiers')">Discipline Tiers</button>
    </div>

    <div id="smp" class="tier-list active">
        <div class="row">
            <div style="display:flex; align-items:center;">
                <img src="itzjohio.png" class="pfp">
                <span class="name">ItzJohio</span>
            </div>
            <span class="t-s">S</span>
        </div>
    </div>

    <div id="pvp" class="tier-list">
        <div class="row">
            <div style="display:flex; align-items:center;">
                <img src="mazotic.png" class="pfp">
                <span class="name">Mazotic</span>
            </div>
            <span class="t-s">S</span>
        </div>
    </div>

    <div id="tiers" class="tier-list">
        <div class="tiers-grid">
            
            <div class="tier-card">
                <div class="icon-box">
                    <img src="sword_icon.png" alt="Sword">
                </div>
                <span class="card-title">Sword</span>
                <div class="player-entry"><span>Mazotic</span> <span class="t-s">S</span></div>
                <div class="player-entry"><span>mohamm3dJA</span> <span class="t-a">A</span></div>
            </div>

            <div class="tier-card">
                <div class="icon-box">
                    <img src="axe_icon.png" alt="Axe">
                </div>
                <span class="card-title">Axe</span>
                <div class="player-entry"><span>ItzJohio</span> <span class="t-s">S</span></div>
                <div class="player-entry"><span>WaterPlant</span> <span class="t-a">A</span></div>
            </div>

            <div class="tier-card">
                <div class="icon-box">
                    <img src="crystal_icon.png" alt="Crystal">
                </div>
                <span class="card-title">Crystal</span>
                <div class="player-entry"><span>MaxieX</span> <span class="t-a">A</span></div>
            </div>

            <div class="tier-card">
                <div class="icon-box">
                    <img src="cart_icon.png" alt="Cart">
                </div>
                <span class="card-title">Cart PvP</span>
                <div class="player-entry"><span>mohamm3dJA</span> <span class="t-s">S</span></div>
            </div>

        </div>
    </div>
</div>

<script>
    function openTab(tabName) {
        var lists = document.getElementsByClassName("tier-list");
        for (var i = 0; i < lists.length; i++) { lists[i].classList.remove("active"); }
        var buttons = document.getElementsByClassName("tab-btn");
        for (var i = 0; i < buttons.length; i++) { buttons[i].classList.remove("active"); }
        document.getElementById(tabName).classList.add("active");
        event.currentTarget.classList.add("active");
    }
</script>

</body>
</html>
