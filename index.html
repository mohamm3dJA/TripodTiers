<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@500;800&display=swap');

    html {
        scroll-behavior: smooth;
    }

    /* Standard Row Styling */
    .row {
        background: rgba(21, 21, 27, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid #26262e;
        border-radius: 25px;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        cursor: pointer;
    }

    /* Hover Effect for all Rows */
    .row:hover {
        transform: scale(1.02);
        border-color: rgba(255, 127, 255, 0.4); 
        background: rgba(30, 30, 40, 0.9);
    }

    /* The rest of your CSS (body, container, region-tags, etc.) goes here... */
</style>
