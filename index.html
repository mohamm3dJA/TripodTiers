<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tripod Tiers</title>
    <link rel="icon" type="image/png" href="Tripod.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@500;800&display=swap');

        /* Smooth Scroll behavior for standard scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Lenis Recommended CSS */
        html.lenis, html.lenis body { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
        .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
        .lenis.lenis-stopped { overflow: hidden; }
        .lenis.lenis-scrolling iframe { pointer-events: none; }

        body {
            background: linear-gradient(-45deg, #0b0b0e, #1a1a24, #0b0b0e, #12121a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes sectionFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            width: 100%;
            max-width: 600px;
            transition: max-width 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: max-width;
        }

        .container.wide { max-width: 1000px; }

        .top-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .nav-icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 65px; 
            height: 65px;
        }

        .nav-icon-btn:hover:not(.disabled) {
            background: rgba(255, 127, 255, 0.1);
            border-color: rgba(255, 127, 255, 0.6);
            box-shadow: 0 0 20px rgba(255, 127, 255, 0.3);
            transform: translateY(-3px);
        }

        .nav-icon-btn img {
            width: 45px; height: 45px;
            filter: brightness(0.8);
            transition: 0.3s ease;
        }

        .nav-icon-btn.disabled { opacity: 0.3; cursor: not-allowed; }

        h1 {
            text-align: center;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            margin-bottom: 10px;
            color: #efefff;
            font-size: 2.5rem;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #777;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            position: relative;
            padding: 5px 15px;
        }

        .tab-btn.active { color: #fff; }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 0;
            width: 100%;
            height: 3px;
            background: #ff7fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 127, 255, 0.5);
        }

        .tier-list { display: none; flex-direction: column; gap: 12px; }
        .tier-list.active { 
            display: flex; 
            animation: sectionFade 0.4s ease-out forwards;
        }

        .row {
            background: rgba(21, 21, 27, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #26262e;
            border-radius: 25px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s ease;
        }

        .row:hover {
            transform: scale(1.02);
            border-color: rgba(255, 127, 255, 0.4);
        }

        .left { display: flex; align-items: center; gap: 15px; }
        .pfp { width: 48px; height: 48px; border-radius: 50%; border: 2px solid #26262e; background: #222; }
        .name { font-weight: 700; font-family: 'Outfit', sans-serif; }
        
        /* Tiers */
        .tier {
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; font-weight: 900; font-size: 0.85rem;
            color: #000;
        }

        .s { background: #ff7fff; }
        .a { background: #ff4d4d; color: white; }
        .b { background: #ffaa42; }
        .c { background: #ffdf5d; }
        .d { background: #5dff8a; }

        .lt4 { background: #ff7fff; }
        .ht5 { background: #ff4d4d; color: white; }
        .lt5 { background: #ffaa42; }

        .t-small { font-weight: 900; padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; width: auto; height: auto; }

        /* Grid for Disciplines */
        .tiers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .tier-card {
            background: rgba(21, 21, 27, 0.8);
            border: 1px solid #26262e;
            border-radius: 24px;
            padding: 20px;
            transition: 0.3s ease;
        }

        .player-entry {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 12px; border-radius: 10px; margin-bottom: 6px;
        }

        .region-tag {
            padding: 5px 12px; border-radius: 10px; font-weight: 800; font-size: 0.8rem;
        }
        .as { background: #4dff88; color: #0c331a; }
        .eu { background: #4d94ff; color: white; }
        .na { background: #ff4d4d; color: white; }

        .discord-tag { color: #7289da; font-size: 0.85rem; font-weight: 600; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="top-nav">
        <button class="nav-icon-btn" onclick="openTab('profile-list')" title="Profiles">
            <img src="profiles.png" alt="Profiles">
        </button>
        <button class="nav-icon-btn disabled" title="Coming Soon">
            <img src="Tripod.png" style="opacity: 0.5;">
        </button>
        <button class="nav-icon-btn disabled" title="Coming Soon">
            <img src="Tripod.png" style="opacity: 0.5;">
        </button>
    </div>

    <h1>Tripod Tiers</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('smp')">SMP</button>
        <button class="tab-btn" onclick="openTab('pvp')">PvP</button>
        <button class="tab-btn" onclick="openTab('disciplines')">Tiers</button>
        <button class="tab-btn" onclick="openTab('regions')">Regions</button>
    </div>
    
    <!-- Tab Contents -->
    <div id="profile-list" class="tier-list">
        <!-- List remains same -->
        <div class="row"><div class="left"><img src="mohamm3d.png" class="pfp"><span class="name">mohamm3dJA</span></div><div class="discord-tag">@mohamm3d</div></div>
        <div class="row"><div class="left"><img src="johio747.png" class="pfp"><span class="name">ItzJohio</span></div><div class="discord-tag">@johio_747</div></div>
        <div class="row"><div class="left"><img src="onb.fr.png" class="pfp"><span class="name">WaterPlant</span></div><div class="discord-tag">@onb.fr</div></div>
    </div>

    <div id="smp" class="tier-list active">
        <div class="row"><div class="left"><img src="itzjohio.png" class="pfp"><span class="name">ItzJohio</span></div><div class="tier s">S</div></div>
        <div class="row"><div class="left"><img src="mohamm3dJA.png" class="pfp"><span class="name">mohamm3dJA</span></div><div class="tier a">A</div></div>
    </div>

    <div id="disciplines" class="tier-list">
        <div class="tiers-grid">
            <div class="tier-card">
                <span class="name" style="display:block; margin-bottom:15px; text-align:center; font-size:1.3rem;">Sword</span>
                <div class="player-entry"><span>mohamm3dJA</span><span class="tier lt4 t-small">LT4</span></div>
                <!-- Updated Gmplayz_ to LT4 here -->
                <div class="player-entry"><span>Gmplayz_</span><span class="tier lt4 t-small">LT4</span></div>
                <div class="player-entry"><span>MaxieX</span><span class="tier lt4 t-small">LT4</span></div>
                <div class="player-entry"><span>Wraxiee</span><span class="tier ht5 t-small">HT5</span></div>
                <div class="player-entry"><span>WaterPlant</span><span class="tier lt5 t-small">LT5</span></div>
            </div>
            <!-- Other cards... -->
        </div>
    </div>

    <div id="regions" class="tier-list">
        <div class="row"><div class="left"><img src="mohamm3dJA.png" class="pfp"><span class="name">mohamm3dJA</span></div><div class="region-tag as">AS</div></div>
    </div>
</div>

<script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>
<script>
    // Initialize Lenis
    const lenis = new Lenis()

    function raf(time) {
      lenis.raf(time)
      requestAnimationFrame(raf)
    }
    requestAnimationFrame(raf)

    function openTab(tabName) {
        const container = document.getElementById("mainContainer");
        
        // Handle wide layout
        if(tabName === 'disciplines') {
            container.classList.add("wide");
        } else {
            container.classList.remove("wide");
        }

        // Reset Tabs & Content
        document.querySelectorAll('.tier-list').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

        document.getElementById(tabName).classList.add('active');
        
        // Highlight correct button if it was a tab click
        if (event && event.currentTarget.classList.contains('tab-btn')) {
            event.currentTarget.classList.add("active");
        }

        // Reset scroll position smoothly
        lenis.scrollTo(0);
    }
</script>
</body>
</html>
